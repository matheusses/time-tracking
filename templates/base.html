<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Time Tracking{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen" data-timesheet-grid-url="{% url 'tracking:timesheet_grid' %}">
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-3 sm:px-6 lg:px-8 flex items-center justify-between">
            <h1 class="text-xl font-semibold text-gray-800">
                <a href="{% url 'tracking:home' %}" class="text-gray-800 hover:text-gray-900">Time Tracking</a>
            </h1>
            <nav class="flex items-center gap-4">
                {% if user.is_authenticated %}
                <span class="text-sm text-gray-600">{{ user.get_username }}</span>
                <form method="post" action="{% url 'logout' %}" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-sm font-medium text-gray-600 hover:text-gray-900 bg-transparent border-none cursor-pointer p-0">Log out</button>
                </form>
                {% else %}
                <a href="{% url 'login' %}" class="text-sm font-medium text-green-600 hover:text-green-800">Log in</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}
    <script>
    function refreshTimesheetGrid() {
      var container = document.getElementById('timesheet-grid-container');
      if (!container) return;
      var wrapper = container.querySelector('[data-week]');
      var week = wrapper ? wrapper.getAttribute('data-week') : '';
      var baseUrl = document.body.getAttribute('data-timesheet-grid-url') || '';
      if (baseUrl && week) {
        var sep = baseUrl.indexOf('?') !== -1 ? '&' : '?';
        htmx.ajax('get', baseUrl + sep + 'week=' + encodeURIComponent(week) + '&editable=0', {
          target: '#timesheet-grid-container',
          swap: 'innerHTML'
        });
      }
    }

    document.body.addEventListener('click', function(e) {
      if (e.target.id === 'timesheet-save-all') {
        var container = document.getElementById('timesheet-grid-container');
        if (!container) return;
        container.querySelectorAll('form').forEach(function(f) { f.requestSubmit(); });
        setTimeout(refreshTimesheetGrid, 1500);
      }
    });

    document.body.addEventListener('timesheetGridRefresh', refreshTimesheetGrid);
    </script>
</body>
</html>
