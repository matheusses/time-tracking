# Pytest configuration for Django. Run: pytest or python manage.py test
[pytest]
DJANGO_SETTINGS_MODULE = project.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
# Discover tests in core.tests, tracking.tests, project_management.tests
testpaths = core/tests tracking/tests project_management/tests
